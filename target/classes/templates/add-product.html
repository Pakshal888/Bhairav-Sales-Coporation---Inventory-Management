
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <link rel="stylesheet" href="/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Bhairav Sales Corporation</h1>
            <nav>
                <a href="/dashboard">Dashboard</a>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn-logout">Logout</button>
                </form>
            </nav>
        </div>
    </header>

    <div class="container">
        <h2>Add Product</h2>
        <form action="/save" method="post" th:object="${product}" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label>Brand</label>
                <input type="text" th:field="*{brand}" required>
            </div>
            <div class="form-group">
                <label>Size</label>
                <input type="text" th:field="*{size}" required>
            </div>
            <div class="form-group">
                <label>Purchase Rate</label>
                <input type="number" step="0.01" th:field="*{purchaseRate}" required>
            </div>
            <div class="form-group">
                <label>Stock Rate</label>
                <input type="number" step="0.01" th:field="*{stockRate}" required>
            </div>
            <div class="form-group">
                <label>Thickness</label>
                <input type="number" th:field="*{thickness}" required>
            </div>
            <div class="form-group">
                <label>Quantity</label>
                <input type="number" th:field="*{quantity}" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select th:field="*{category}" required>
                    <option value="">Select Category</option>
                    <option value="Hardware">Hardware</option>
                    <option value="Electric">Electric</option>
                    <option value="Plumbing">Plumbing</option>
                    <option value="Fancyware">Fancyware</option>
                    <option value="Sanitaryware">Sanitaryware</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">Save</button>
        </form>
    </div>

    <footer>
        <p>© 2026 Designed & Developed by Pakshal Jain #Software Engineer</p>
    </footer>
</body>
</html>
