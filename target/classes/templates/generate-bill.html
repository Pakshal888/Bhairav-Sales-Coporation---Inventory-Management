<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Generate Bill</title>
    <link rel="stylesheet" href="/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Bhairav Sales Corporation</h1>
            <nav>
                <a href="/dashboard">Dashboard</a>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn-logout">Logout</button>
                </form>
            </nav>
        </div>
    </header>

    <div class="container">
        <h2>Generate Bill</h2>
        <form id="billForm" action="/bill/generate" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" name="customerName" required>
            </div>

            <div class="estimate-section">
                <table class="estimate-table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Company</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="itemsBody"></tbody>
                </table>
                <button type="button" id="addItemRow" class="btn-add">+ Add Custom Item</button>
            </div>

            <div class="summary-grid">
                <div>
                    <label>Total Amount</label>
                    <div id="totalAmount">₹0.00</div>
                </div>
                <div>
                    <label>Discount</label>
                    <input id="discount" name="discount" type="number" step="0.01" value="0">
                </div>
                <div>
                    <label>Final Amount</label>
                    <div id="finalAmount">₹0.00</div>
                </div>
            </div>

            <button type="submit" class="btn-submit">Generate Bill</button>
        </form>
    </div>

    <script>
        const electricItems = [
            '6A Switch', '6A Socket', '16A Switch', '16A Socket', '6A 2way Switch',
            '16A 2way Switch', 'Indicator', 'Blank Plate', 'Regulator 1M', 'Regulator 2M',
            '32A DP Switch', '18M Box', '18M Plate', '12M Box', '12M Plate', '8M Box',
            '8M Plate', '6M Box', '6M Plate', '4M Box', '4M Plate', '3M Box', '3M Plate',
            '1/2M Box', '1/2M Plate', '32A Modular MCB', '25A Modular MCB', '16A Modular MCB',
            '10A Modular MCB', '6A Modular MCB', '32A MCB', '25A MCB', '16A MCB',
            '10A MCB', '6A MCB'
        ];

        const companies = ['Alemac', 'GM', 'Roma', 'Skava', 'Hifi', 'Other', 'N/A'];

        function createItemRow(name) {
            const row = $('<tr></tr>');
            const companyOptions = companies.map(c => `<option value="${c}">${c}</option>`).join('');

            row.append(`<td><span>${name}</span><input type="hidden" name="itemNames" value="${name}"></td>`);
            row.append(`<td><select name="companies">${companyOptions}</select></td>`);
            row.append(`<td><input type="number" name="priceStrings" class="item-price" min="0" step="0.01" value="0"></td>`);
            row.append(`<td><input type="number" name="quantityStrings" class="item-quantity" min="0" step="1" value="0"></td>`);
            row.append(`<td class="item-amount">₹0.00</td>`);
            row.append(`<td><button type="button" class="btn-delete">Delete</button></td>`);
            return row;
        }

        function createCustomItemRow(name = '') {
            const row = $('<tr></tr>');
            const companyOptions = companies.map(c => `<option value="${c}">${c}</option>`).join('');

            row.append(`<td><input type="text" name="itemNames" class="item-name" placeholder="Enter item name" value="${name}"></td>`);
            row.append(`<td><select name="companies">${companyOptions}</select></td>`);
            row.append(`<td><input type="number" name="priceStrings" class="item-price" min="0" step="0.01" value="0"></td>`);
            row.append(`<td><input type="number" name="quantityStrings" class="item-quantity" min="0" step="1" value="0"></td>`);
            row.append(`<td class="item-amount">₹0.00</td>`);
            row.append(`<td><button type="button" class="btn-delete">Delete</button></td>`);
            return row;
        }

        function updateTotals() {
            let total = 0;
            $('#itemsBody tr').each(function() {
                const price = parseFloat($(this).find('.item-price').val()) || 0;
                const qty = parseInt($(this).find('.item-quantity').val()) || 0;
                const amount = price * qty;
                $(this).find('.item-amount').text('₹' + amount.toFixed(2));
                total += amount;
            });
            $('#totalAmount').text('₹' + total.toFixed(2));
            const discount = parseFloat($('#discount').val()) || 0;
            const finalAmount = Math.max(total - discount, 0);
            $('#finalAmount').text('₹' + finalAmount.toFixed(2));
        }

        function populateDefaultItems() {
            $('#itemsBody').empty();
            electricItems.forEach(itemName => {
                $('#itemsBody').append(createItemRow(itemName));
            });
            updateTotals();
        }

        $(document).ready(function() {
            $(document).on('input', '.item-price, .item-quantity, #discount', function() {
                updateTotals();
            });

            $(document).on('click', '.btn-delete', function() {
                $(this).closest('tr').remove();
                updateTotals();
            });

            $('#billForm').submit(function(e) {
                let invalidRow = false;
                $('#itemsBody tr').each(function() {
                    const name = $(this).find('[name="itemNames"]').val()?.trim() || '';
                    const price = parseFloat($(this).find('.item-price').val()) || 0;
                    const qty = parseInt($(this).find('.item-quantity').val()) || 0;
                    if ((price > 0 || qty > 0) && !name) {
                        invalidRow = true;
                        return false;
                    }
                });
                if (invalidRow) {
                    e.preventDefault();
                    alert('Please enter an item name for rows with a price or quantity.');
                }
            });

            $('#addItemRow').click(function() {
                const newRow = createCustomItemRow();
                $('#itemsBody').append(newRow);
                newRow.find('.item-name').focus();
            });

            populateDefaultItems();
        });
    </script>

    <footer>
        <p>&copy; 2026 Designed & Developed by Pakshal Jain #Software Engineer</p>
    </footer>
</body>
</html>
