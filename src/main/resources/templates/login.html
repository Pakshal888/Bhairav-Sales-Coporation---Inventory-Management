<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Hardware Shop</title>
    <link rel="stylesheet" href="/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="login-shell">
        <div class="login-overlay"></div>
        <div class="login-card">
            <div class="login-branding">
                <div class="brand-badge">BS</div>
                <div>
                    <p class="eyebrow">Enterprise portal</p>
                    <h2>Hardware Shop Login</h2>
                </div>
            </div>
            <form th:action="@{/login}" method="post" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn-login">Login</button>
            </form>
            <div th:if="${param.error}" class="alert error">Invalid username or password</div>
            <div th:if="${param.logout}" class="alert success">You have been logged out</div>
        </div>
    </div>
</body>
</html>
